<!doctype html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <link rel="icon" type="image/svg+xml" href="/vite.svg" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <!-- Primary Meta -->
  <title>GetSEOBolt — AI Product Descriptions for E-commerce</title>
  <meta name="description" content="Generate SEO-optimized product descriptions for Shopify, WooCommerce, Amazon and more. Powered by AI. Packages from $15." />
  <link rel="canonical" href="https://getseobolt.com/" />

  <!-- Open Graph -->
  <meta property="og:title" content="GetSEOBolt — AI Product Descriptions for E-commerce" />
  <meta property="og:description" content="Generate SEO-optimized product descriptions for Shopify, WooCommerce, Amazon and more. Powered by AI. Packages from $15." />
  <meta property="og:type" content="website" />
  <meta property="og:url" content="https://getseobolt.com/" />
  <meta property="og:image" content="https://getseobolt.com/og-image.png" />

  <!-- Twitter Card -->
  <meta name="twitter:card" content="summary_large_image" />
  <meta name="twitter:title" content="GetSEOBolt — AI Product Descriptions for E-commerce" />
  <meta name="twitter:description" content="Generate high-converting, SEO-optimized product descriptions for your e-commerce store in just one click." />
  <meta name="twitter:image" content="https://getseobolt.com/og-image.png" />

  <!-- Google Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet" />

  <!-- JSON-LD: Service Schema -->
  <script type="application/ld+json">
  {
    "@context": "https://schema.org",
    "@type": "Service",
    "name": "GetSEOBolt",
    "description": "AI-powered SEO product description generator for e-commerce stores",
    "url": "https://getseobolt.com",
    "provider": {
      "@type": "Organization",
      "name": "GetSEOBolt",
      "url": "https://getseobolt.com"
    },
    "offers": [
      {
        "@type": "Offer",
        "name": "Basic",
        "price": "15",
        "priceCurrency": "USD",
        "description": "5 product descriptions, SEO titles and meta descriptions, 1 revision round"
      },
      {
        "@type": "Offer",
        "name": "Standard",
        "price": "30",
        "priceCurrency": "USD",
        "description": "10 product descriptions, short and long descriptions, 5 bullet points per product, 2 revision rounds"
      },
      {
        "@type": "Offer",
        "name": "Premium",
        "price": "55",
        "priceCurrency": "USD",
        "description": "10 product descriptions, complete descriptions, SEO keyword research, competitor analysis, 3 revision rounds"
      }
    ]
  }
  </script>

  <!-- JSON-LD: FAQ Schema -->
  <script type="application/ld+json">
  {
    "@context": "https://schema.org",
    "@type": "FAQPage",
    "mainEntity": [
      {
        "@type": "Question",
        "name": "How do I submit my products?",
        "acceptedAnswer": {
          "@type": "Answer",
          "text": "Upload a CSV file with your product names, specs, and any keywords you want to target. We handle the rest."
        }
      },
      {
        "@type": "Question",
        "name": "What platforms are supported?",
        "acceptedAnswer": {
          "@type": "Answer",
          "text": "We export ready-to-import CSVs for Shopify, WooCommerce, Amazon, Wix, BigCommerce, PrestaShop, and more."
        }
      },
      {
        "@type": "Question",
        "name": "How many revisions are included?",
        "acceptedAnswer": {
          "@type": "Answer",
          "text": "Basic plan includes 1 revision round, Standard includes 2, and Premium includes 3 revision rounds."
        }
      },
      {
        "@type": "Question",
        "name": "How fast will I get my descriptions?",
        "acceptedAnswer": {
          "@type": "Answer",
          "text": "Most orders are delivered within 24 hours. Premium orders may take up to 48 hours."
        }
      }
    ]
  }
  </script>
</head>

<body>
  <div id="root"></div>

</body>

</html>
